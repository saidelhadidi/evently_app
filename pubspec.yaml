name: evently_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.4
  provider: ^6.1.5+1
  smooth_page_indicator: ^2.0.1
  intl: ^0.20.2
  shared_preferences: ^2.5.4
  easy_localization: ^3.0.8
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  path_provider: ^2.1.5
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
     - assets/icons/
     - assets/images/
     - assets/images/onBoarding/
     - assets/icons/textFormField/
     - assets/icons/navigationBar/
     - assets/icons/categories/
     - assets/images/categories/lightMode/
     - assets/images/categories/darkMode/
     - assets/icons/eventActions/
     - assets/readme/
     - assets/translations/

  fonts:
      - family: Poppins
        fonts:
          - asset: assets/fonts/Poppins/Poppins-Regular.ttf
          - asset: assets/fonts/Poppins/Poppins-Bold.ttf
            weight: 700
